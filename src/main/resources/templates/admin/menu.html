<!DOCTYPE html>

  Copyright 2022 株式会社BREXA Technology
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メニュー | KEN Interior Shop 管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

  <header class="admin-header">
    <p>KEN Interior Shop 管理システム</p>
    <nav>
      <span th:text="${staffName}" style="color:var(--color-gray-light); font-size:0.88rem;"></span>
      <form th:action="@{/admin/logout}" method="post" style="display:inline;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="btn--link">ログアウト</button>
      </form>
    </nav>
  </header>

  <main class="admin-main">
    <h1>メニュー</h1>

    <div class="menu-grid">
      <!-- 全員 -->
      <a th:href="@{/admin/send}" class="menu-card">発送一覧</a>
      <a th:href="@{/admin/stock}" class="menu-card">商品在庫一覧</a>

      <!-- 社員・委託業者 -->
      <a th:if="${#authorization.expression('hasAnyRole(''ROLE_STAFF_FULL'',''ROLE_STAFF_OUTSOURCE'')')}"
         th:href="@{/admin/earnings}" class="menu-card">売上一覧</a>
      <a th:if="${#authorization.expression('hasAnyRole(''ROLE_STAFF_FULL'',''ROLE_STAFF_OUTSOURCE'')')}"
         th:href="@{/admin/members}" class="menu-card">会員一覧</a>

      <!-- 社員・契約社員 -->
      <a th:if="${#authorization.expression('hasAnyRole(''ROLE_STAFF_FULL'',''ROLE_STAFF_CONTRACT'')')}"
         th:href="@{/admin/categories}" class="menu-card">分類一覧</a>
      <a th:if="${#authorization.expression('hasAnyRole(''ROLE_STAFF_FULL'',''ROLE_STAFF_CONTRACT'')')}"
         th:href="@{/admin/products}" class="menu-card">商品一覧</a>

      <!-- 社員のみ -->
      <a th:if="${#authorization.expression('hasRole(''ROLE_STAFF_FULL'')')}"
         th:href="@{/admin/staff}" class="menu-card">社員一覧</a>
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; 2022 KEN Furniture Factory</p>
  </footer>

</body>
</html>
