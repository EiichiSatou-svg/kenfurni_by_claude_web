<!DOCTYPE html>
<!--
  中分類登録・更新画面
  Copyright 2022 株式会社BREXA Technology
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中分類登録・更新 | KEN Interior Shop 管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

  <header class="admin-header">
    <p>KEN Interior Shop 管理システム</p>
    <nav>
      <a th:href="@{/admin/menu}">メニュー</a>
      <form th:action="@{/admin/logout}" method="post" style="display:inline;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="btn--link">ログアウト</button>
      </form>
    </nav>
  </header>

  <main class="admin-main">
    <div class="page-header">
      <h1 th:text="'大分類：' + ${category.categoryName} + ' の中分類' + (${subcategory.subcategoryId == null ? '登録' : '更新'})"></h1>
      <a th:href="@{/admin/categories}" class="btn btn--secondary">キャンセル</a>
    </div>

    <div class="form-card">
      <form th:action="${subcategory.subcategoryId == null ?
            '/admin/categories/' + subcategory.categoryId + '/subcategories/new' :
            '/admin/categories/' + subcategory.categoryId + '/subcategories/' + subcategory.subcategoryId + '/edit'}"
            th:object="${subcategory}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="form-group">
          <label for="subcategoryId">中分類ID</label>
          <input type="number" id="subcategoryId" th:field="*{subcategoryId}"
                 th:readonly="${subcategory.subcategoryId != null}" required>
        </div>
        <div class="form-group">
          <label for="subcategoryName">中分類名</label>
          <input type="text" id="subcategoryName" th:field="*{subcategoryName}" required>
        </div>
        <div class="form-group">
          <label>有効フラグ</label>
          <label><input type="radio" th:field="*{validFlag}" value="0">有効</label>
          <label><input type="radio" th:field="*{validFlag}" value="9">無効</label>
        </div>

        <button type="submit" class="btn btn--primary">保存</button>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; 2022 KEN Furniture Factory</p>
  </footer>

</body>
</html>
