<!DOCTYPE html>
<!--
  管理側社員一覧画面
  Copyright 2022 株式会社BREXA Technology
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社員一覧 | KEN Interior Shop 管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

  <header class="admin-header">
    <p>KEN Interior Shop 管理システム</p>
    <nav>
      <a th:href="@{/admin/menu}">メニュー</a>
      <form th:action="@{/admin/logout}" method="post" style="display:inline;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="btn--link">ログアウト</button>
      </form>
    </nav>
  </header>

  <main class="admin-main">
    <div class="page-header">
      <h1>社員一覧</h1>
      <a th:href="@{/admin/staff/new}" class="btn btn--primary">社員を追加</a>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>社員ID</th>
            <th>氏名</th>
            <th>氏名（カナ）</th>
            <th>権限</th>
            <th>登録日</th>
            <th>有効</th>
            <th>編集</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="staff : ${staffList}">
            <td th:text="${staff.staffId}"></td>
            <td th:text="${staff.staffName}"></td>
            <td th:text="${staff.staffKana}"></td>
            <td th:switch="${staff.staffAuthorityFlag}">
              <span th:case="'0'">社員</span>
              <span th:case="'1'">契約社員</span>
              <span th:case="'2'">委託業者</span>
              <span th:case="'5'">アルバイト</span>
              <span th:case="*">その他</span>
            </td>
            <td th:text="${staff.staffRegistday}"></td>
            <td th:text="${staff.validFlag == '0' ? '有効' : '無効'}"></td>
            <td><a th:href="@{/admin/staff/{id}/edit(id=${staff.staffId})}">編集</a></td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; 2022 KEN Furniture Factory</p>
  </footer>

</body>
</html>
