<!DOCTYPE html>

  Copyright 2022 株式会社BREXA Technology
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>売上一覧 | KEN Interior Shop 管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

  <header class="admin-header">
    <p>KEN Interior Shop 管理システム</p>
    <nav>
      <a th:href="@{/admin/menu}">メニュー</a>
      <form th:action="@{/admin/logout}" method="post" style="display:inline;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="btn--link">ログアウト</button>
      </form>
    </nav>
  </header>

  <main class="admin-main">
    <h1>売上一覧</h1>

    <form th:action="@{/admin/earnings}" method="get" style="margin-bottom:1.5rem; display:flex; gap:0.5rem; align-items:center;">
      <label for="year">年度</label>
      <input type="number" id="year" name="year" th:value="${year}"
             style="padding:0.5rem 0.8rem; border:1.5px solid var(--color-gray-light); border-radius:var(--radius); font-size:0.95rem; width:120px;">
      <button type="submit" class="btn btn--primary">表示</button>
    </form>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>商品ID</th>
            <th>商品名</th>
            <th>年度</th>
            <th>年間売上合計</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="earnings : ${earningsList}">
            <td th:text="${earnings.productId}"></td>
            <td th:text="${earnings.productName}"></td>
            <td th:text="${earnings.year}"></td>
            <td th:text="${#numbers.formatInteger(earnings.totalAmount, 1, 'COMMA') + '円'}"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; 2022 KEN Furniture Factory</p>
  </footer>

</body>
</html>
