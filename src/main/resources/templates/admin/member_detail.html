<!DOCTYPE html>
<!--
  管理側会員詳細画面
  Copyright 2022 株式会社BREXA Technology
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会員詳細 | KEN Interior Shop 管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

  <header class="admin-header">
    <p>KEN Interior Shop 管理システム</p>
    <nav>
      <a th:href="@{/admin/menu}">メニュー</a>
      <form th:action="@{/admin/logout}" method="post" style="display:inline;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="btn--link">ログアウト</button>
      </form>
    </nav>
  </header>

  <main class="admin-main">
    <div class="page-header">
      <h1>会員詳細</h1>
      <a th:href="@{/admin/members}" class="btn btn--secondary">会員一覧に戻る</a>
    </div>

    <div class="form-card" style="max-width:600px;">
      <table>
        <tr><th>会員ID</th><td th:text="${member.memberId}"></td></tr>
        <tr><th>氏名</th><td th:text="${member.memberName}"></td></tr>
        <tr><th>氏名（カナ）</th><td th:text="${member.memberKana}"></td></tr>
        <tr><th>メールアドレス</th><td th:text="${member.memberMail}"></td></tr>
        <tr><th>生年月日</th><td th:text="${member.memberBirthday}"></td></tr>
        <tr><th>郵便番号</th><td th:text="${member.memberPost}"></td></tr>
        <tr><th>住所</th><td th:text="${member.memberAddress}"></td></tr>
        <tr><th>電話番号</th><td th:text="${member.memberPhone}"></td></tr>
        <tr><th>支払方法</th><td th:text="${member.memberPayment == '1' ? 'クレジットカード' : '現金'}"></td></tr>
        <tr><th>ポイント</th><td th:text="${member.memberPoint} + 'pt'"></td></tr>
        <tr><th>入会日</th><td th:text="${member.signupDay}"></td></tr>
        <tr><th>状態</th><td th:text="${member.validFlag == '0' ? '有効' : '退会'}"></td></tr>
      </table>
    </div>

    <h2>購入履歴</h2>
    <div class="table-wrapper">
      <table th:unless="${#lists.isEmpty(historyList)}">
        <thead>
          <tr>
            <th>購入ID</th>
            <th>購入日</th>
            <th>合計金額</th>
            <th>状態</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="history : ${historyList}">
            <td th:text="${history.purchaseId}"></td>
            <td th:text="${history.purchaseDay}"></td>
            <td th:text="${#numbers.formatInteger(history.totalAmount, 1, 'COMMA') + '円'}"></td>
            <td th:text="${history.cancelFlag == '0' ? '購入済' : 'キャンセル'}"></td>
          </tr>
        </tbody>
      </table>
      <p th:if="${#lists.isEmpty(historyList)}">購入履歴がありません。</p>
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; 2022 KEN Furniture Factory</p>
  </footer>

</body>
</html>
