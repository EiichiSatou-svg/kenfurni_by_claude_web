<!DOCTYPE html>
<!--
  管理側社員登録・更新画面
  Copyright 2022 株式会社BREXA Technology
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社員登録・更新 | KEN Interior Shop 管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

  <header class="admin-header">
    <p>KEN Interior Shop 管理システム</p>
    <nav>
      <a th:href="@{/admin/menu}">メニュー</a>
      <form th:action="@{/admin/logout}" method="post" style="display:inline;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="btn--link">ログアウト</button>
      </form>
    </nav>
  </header>

  <main class="admin-main">
    <div class="page-header">
      <h1 th:text="${staff.staffId == null ? '社員登録' : '社員情報更新'}"></h1>
      <a th:href="@{/admin/staff}" class="btn btn--secondary">キャンセル</a>
    </div>

    <div class="form-card">
      <form th:action="${staff.staffId == null ? '/admin/staff/new' : '/admin/staff/' + staff.staffId + '/edit'}"
            th:object="${staff}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="form-group">
          <label for="staffName">氏名</label>
          <input type="text" id="staffName" th:field="*{staffName}" required>
        </div>
        <div class="form-group">
          <label for="staffKana">氏名（カナ）</label>
          <input type="text" id="staffKana" th:field="*{staffKana}" required>
        </div>
        <div class="form-group">
          <label for="staffPassword">パスワード</label>
          <input type="password" id="staffPassword" th:field="*{staffPassword}" required>
        </div>
        <div class="form-group">
          <label for="staffAuthorityFlag">権限</label>
          <select id="staffAuthorityFlag" th:field="*{staffAuthorityFlag}">
            <option value="0">社員</option>
            <option value="1">契約社員</option>
            <option value="2">委託業者</option>
            <option value="5">アルバイト</option>
            <option value="9">その他</option>
          </select>
        </div>
        <div class="form-group">
          <label for="staffRegistday">登録日</label>
          <input type="date" id="staffRegistday" th:field="*{staffRegistday}" required>
        </div>
        <div class="form-group">
          <label for="staffRetirementday">退職日</label>
          <input type="date" id="staffRetirementday" th:field="*{staffRetirementday}">
        </div>
        <div class="form-group">
          <label>有効フラグ</label>
          <label><input type="radio" th:field="*{validFlag}" value="0">有効</label>
          <label><input type="radio" th:field="*{validFlag}" value="9">無効</label>
        </div>

        <button type="submit" class="btn btn--primary">保存</button>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; 2022 KEN Furniture Factory</p>
  </footer>

</body>
</html>
