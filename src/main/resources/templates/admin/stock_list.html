<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品在庫一覧 | KEN Interior Shop 管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

  <header class="admin-header">
    <p>KEN Interior Shop 管理システム</p>
    <nav>
      <a th:href="@{/admin/menu}">メニュー</a>
      <form th:action="@{/admin/logout}" method="post" style="display:inline;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="btn--link">ログアウト</button>
      </form>
    </nav>
  </header>

  <main class="admin-main">
    <div class="page-header">
      <h1>商品在庫一覧</h1>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>商品ID</th>
            <th>商品名</th>
            <th>在庫数</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="stock : ${stockList}">
            <td th:text="${stock.productId}"></td>
            <td th:text="${stock.productName}"></td>
            <td th:text="${stock.productStock}"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; 2022 KEN Furniture Factory</p>
  </footer>

</body>
</html>
