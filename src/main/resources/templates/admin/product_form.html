<!DOCTYPE html>
<!--
  管理側商品登録・更新画面
  Copyright 2022 株式会社BREXA Technology
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品登録・更新 | KEN Interior Shop 管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

  <header class="admin-header">
    <p>KEN Interior Shop 管理システム</p>
    <nav>
      <a th:href="@{/admin/menu}">メニュー</a>
      <form th:action="@{/admin/logout}" method="post" style="display:inline;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="btn--link">ログアウト</button>
      </form>
    </nav>
  </header>

  <main class="admin-main">
    <div class="page-header">
      <h1 th:text="${product.productId == null ? '商品登録' : '商品更新'}"></h1>
      <a th:href="@{/admin/products}" class="btn btn--secondary">キャンセル</a>
    </div>

    <div class="form-card" style="max-width:600px;">
      <form th:action="${product.productId == null ? '/admin/products/new' : '/admin/products/' + product.productId + '/edit'}"
            th:object="${product}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="form-group">
          <label for="productId">商品ID（例：0101-000001）</label>
          <input type="text" id="productId" th:field="*{productId}"
                 th:readonly="${product.productId != null}" required>
        </div>
        <div class="form-group">
          <label for="productName">商品名</label>
          <input type="text" id="productName" th:field="*{productName}" required>
        </div>
        <div class="form-group">
          <label for="categoryId">大分類</label>
          <select id="categoryId" th:field="*{categoryId}">
            <option th:each="cat : ${categoryList}"
                    th:value="${cat.categoryId}"
                    th:text="${cat.categoryName}"></option>
          </select>
        </div>
        <div class="form-group">
          <label for="subcategoryId">中分類</label>
          <select id="subcategoryId" th:field="*{subcategoryId}">
            <option th:each="sub : ${subcategoryList}"
                    th:value="${sub.subcategoryId}"
                    th:text="${sub.subcategoryName}"></option>
          </select>
        </div>
        <div class="form-group">
          <label for="productPrice">価格</label>
          <input type="number" id="productPrice" th:field="*{productPrice}" required>
        </div>
        <div class="form-group">
          <label for="productDiscountPrice">割引価格</label>
          <input type="number" id="productDiscountPrice" th:field="*{productDiscountPrice}">
        </div>
        <div class="form-group">
          <label for="productImage">画像ファイル名</label>
          <input type="text" id="productImage" th:field="*{productImage}">
        </div>
        <div class="form-group">
          <label for="productSize">サイズ</label>
          <input type="text" id="productSize" th:field="*{productSize}">
        </div>
        <div class="form-group">
          <label for="productColor">カラー</label>
          <input type="text" id="productColor" th:field="*{productColor}">
        </div>
        <div class="form-group">
          <label for="productMaterial">素材</label>
          <input type="text" id="productMaterial" th:field="*{productMaterial}">
        </div>
        <div class="form-group">
          <label for="productSaleStartday">販売開始日</label>
          <input type="date" id="productSaleStartday" th:field="*{productSaleStartday}" required>
        </div>
        <div class="form-group">
          <label for="productSaleStopday">販売停止日</label>
          <input type="date" id="productSaleStopday" th:field="*{productSaleStopday}">
        </div>
        <div class="form-group">
          <label>有効フラグ</label>
          <label><input type="radio" th:field="*{validFlag}" value="0">有効</label>
          <label><input type="radio" th:field="*{validFlag}" value="9">無効</label>
        </div>

        <button type="submit" class="btn btn--primary">保存</button>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; 2022 KEN Furniture Factory</p>
  </footer>

</body>
</html>
