<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大分類登録・更新 | KEN Interior Shop 管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

  <header class="admin-header">
    <p>KEN Interior Shop 管理システム</p>
    <nav>
      <a th:href="@{/admin/menu}">メニュー</a>
      <form th:action="@{/admin/logout}" method="post" style="display:inline;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="btn--link">ログアウト</button>
      </form>
    </nav>
  </header>

  <main class="admin-main">
    <h1 th:text="${category.categoryId == null ? '大分類登録' : '大分類更新'}"></h1>

    <div class="form-card">
      <form th:action="${category.categoryId == null ? '/admin/categories/new' : '/admin/categories/' + category.categoryId + '/edit'}"
            th:object="${category}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="form-group">
          <label for="categoryName">大分類名</label>
          <input type="text" id="categoryName" th:field="*{categoryName}" required>
        </div>

        <div class="form-group">
          <label>有効フラグ</label>
          <label><input type="radio" th:field="*{validFlag}" value="0">有効</label>
          <label><input type="radio" th:field="*{validFlag}" value="9">無効</label>
        </div>

        <button type="submit" class="btn btn--primary">保存</button>
        <a th:href="@{/admin/categories}" class="btn btn--secondary">キャンセル</a>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; 2022 KEN Furniture Factory</p>
  </footer>

</body>
</html>
