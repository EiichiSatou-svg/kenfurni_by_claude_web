<!DOCTYPE html>

  Copyright 2022 株式会社BREXA Technology

<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分類一覧 | KEN Interior Shop 管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

  <header class="admin-header">
    <p>KEN Interior Shop 管理システム</p>
    <nav>
      <a th:href="@{/admin/menu}">メニュー</a>
      <form th:action="@{/admin/logout}" method="post" style="display:inline;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="btn--link">ログアウト</button>
      </form>
    </nav>
  </header>

  <main class="admin-main">
    <div class="page-header">
      <h1>分類一覧</h1>
      <a th:href="@{/admin/categories/new}" class="btn btn--primary">大分類を追加</a>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>大分類ID</th>
            <th>大分類名</th>
            <th>有効</th>
            <th>編集</th>
            <th>中分類追加</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="category : ${categoryList}">
            <td th:text="${category.categoryId}"></td>
            <td th:text="${category.categoryName}"></td>
            <td th:text="${category.validFlag == '0' ? '有効' : '無効'}"></td>
            <td><a th:href="@{/admin/categories/{id}/edit(id=${category.categoryId})}">編集</a></td>
            <td><a th:href="@{/admin/categories/{id}/subcategories/new(id=${category.categoryId})}">追加</a></td>
          </tr>
        </tbody>
      </table>
    </div>

    <h2>中分類一覧</h2>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>大分類ID</th>
            <th>中分類ID</th>
            <th>中分類名</th>
            <th>有効</th>
            <th>編集</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="sub : ${subcategoryList}">
            <td th:text="${sub.categoryId}"></td>
            <td th:text="${sub.subcategoryId}"></td>
            <td th:text="${sub.subcategoryName}"></td>
            <td th:text="${sub.validFlag == '0' ? '有効' : '無効'}"></td>
            <td>
              <a th:href="@{/admin/categories/{cid}/subcategories/{sid}/edit(cid=${sub.categoryId},sid=${sub.subcategoryId})}">編集</a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; 2022 KEN Furniture Factory</p>
  </footer>

</body>
</html>
