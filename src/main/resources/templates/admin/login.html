<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理者ログイン | KEN Interior Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

  <header class="site-header">
    <span class="logo">KEN Interior Shop <span>管理システム</span></span>
  </header>

  <main class="login-main">
    <div class="login-card">
      <h1 class="login-title">管理者ログイン</h1>

      <div th:if="${errorMessage}" class="msg msg--error" th:text="${errorMessage}"></div>
      <div th:if="${logoutMessage}" class="msg msg--info" th:text="${logoutMessage}"></div>

      <form th:action="@{/admin/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="form-group">
          <label for="staffName">スタッフ名</label>
          <input type="text" id="staffName" name="staffName" required autocomplete="username">
        </div>

        <div class="form-group">
          <label for="password">パスワード</label>
          <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn--primary btn--block">ログイン</button>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; 2022 KEN Furniture Factory</p>
  </footer>

</body>
</html>
