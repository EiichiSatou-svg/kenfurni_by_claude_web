<!DOCTYPE html>
<!--

  Copyright 2022 株式会社BREXA Technology

<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>エラー | KEN Interior Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

  <header class="site-header">
    <a th:href="@{/top}" class="logo">KEN Interior Shop</a>
  </header>

  <main class="main-content" style="text-align:center; padding:3rem 0;">
    <h1>システムエラー</h1>
    <p style="color:var(--color-gray); margin:1rem 0 2rem;">
      申し訳ありません。システムエラーが発生しました。
    </p>
    <p th:if="${statusCode}" style="color:var(--color-gray); font-size:0.9rem; margin-bottom:2rem;"
       th:text="'エラーコード：' + ${statusCode}"></p>
    <a th:href="@{/top}" class="btn btn--primary">トップへ戻る</a>
  </main>

  <footer class="site-footer">
    <p>&copy; 2022 KEN Furniture Factory</p>
  </footer>

</body>
</html>
