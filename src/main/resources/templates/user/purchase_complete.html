<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>購入完了 | KEN Interior Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/user.css}">
</head>
<body>

  <header class="site-header">
    <a th:href="@{/top}" class="logo">KEN Interior Shop</a>
    <nav>
      <a th:href="@{/member/mypage}">マイページ</a>
      <a th:href="@{/cart}">カート</a>
      <form th:action="@{/logout}" method="post" style="display:inline;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="btn--link">ログアウト</button>
      </form>
    </nav>
  </header>

  <main class="main-content">
    <div style="text-align:center; padding:3rem 0;">
      <h1 style="margin-bottom:1rem;">ご注文ありがとうございました</h1>
      <p style="color:var(--color-gray); margin-bottom:2rem;">
        ご注文を受け付けました。発送まで今しばらくお待ちください。
      </p>
      <div style="display:flex; gap:1rem; justify-content:center;">
        <a th:href="@{/top}" class="btn btn--primary">トップへ戻る</a>
        <a th:href="@{/member/history}" class="btn btn--secondary">購入履歴を確認する</a>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; 2022 KEN Furniture Factory</p>
  </footer>

</body>
</html>
