<!DOCTYPE html>
<!--
  商品詳細画面
  Copyright 2022 株式会社BREXA Technology
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${product.productName} + ' | KEN Interior Shop'"></title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/user.css}">
</head>
<body>

  <header class="site-header">
    <a th:href="@{/top}" class="logo">KEN Interior Shop</a>
    <nav>
      <a th:href="@{/member/mypage}">マイページ</a>
      <a th:href="@{/cart}">カート</a>
      <form th:action="@{/logout}" method="post" style="display:inline;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="btn--link">ログアウト</button>
      </form>
    </nav>
  </header>

  <main class="main-content">
    <p style="margin-bottom:1rem;"><a th:href="@{/top}">← 商品一覧に戻る</a></p>

    <div class="product-detail">
      <div>
        <img th:if="${product.productImage != null}"
             th:src="@{'/images/' + ${product.productImage}}"
             th:alt="${product.productName}">
        <div th:unless="${product.productImage != null}"
             style="width:100%; height:300px; background:var(--color-gray-light); border-radius:var(--radius); display:flex; align-items:center; justify-content:center; color:var(--color-gray);">
          画像なし
        </div>
      </div>

      <div>
        <h1 th:text="${product.productName}"></h1>

        <div class="product-detail-price">
          <span th:if="${product.productDiscountPrice != null}"
                th:text="${#numbers.formatInteger(product.productDiscountPrice, 1, 'COMMA') + '円'}"></span>
          <span th:unless="${product.productDiscountPrice != null}"
                th:text="${#numbers.formatInteger(product.productPrice, 1, 'COMMA') + '円'}"></span>
          <span th:if="${product.productDiscountPrice != null}"
                class="product-card-price-original"
                th:text="'（通常：' + ${#numbers.formatInteger(product.productPrice, 1, 'COMMA')} + '円）'"></span>
        </div>

        <table style="margin-bottom:1.5rem;">
          <tr th:if="${product.productSize != null}">
            <th>サイズ</th>
            <td th:text="${product.productSize}"></td>
          </tr>
          <tr th:if="${product.productColor != null}">
            <th>カラー</th>
            <td th:text="${product.productColor}"></td>
          </tr>
          <tr th:if="${product.productMaterial != null}">
            <th>素材</th>
            <td th:text="${product.productMaterial}"></td>
          </tr>
        </table>

        <form th:action="@{/cart/add}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <input type="hidden" name="productId" th:value="${product.productId}">
          <div class="form-group">
            <label for="quantity">数量</label>
            <input type="number" id="quantity" name="quantity"
                   value="1" min="1" max="99" style="width:100px;">
          </div>
          <button type="submit" class="btn btn--primary">カートに追加</button>
        </form>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; 2022 KEN Furniture Factory</p>
  </footer>

</body>
</html>
