<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会員登録 | KEN Interior Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/user.css}">
</head>
<body>

  <header class="site-header">
    <a th:href="@{/top}" class="logo">KEN Interior Shop</a>
  </header>

  <main class="main-content">
    <h1>会員登録</h1>

    <div class="form-card">
      <div th:if="${errorMessage}" class="msg msg--error" th:text="${errorMessage}"></div>

      <form th:action="@{/member/register}" th:object="${memberRegisterForm}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="form-group">
          <label for="memberMail">メールアドレス</label>
          <input type="email" id="memberMail" th:field="*{memberMail}" required>
        </div>
        <div class="form-group">
          <label for="memberPassword">パスワード（10文字以上）</label>
          <input type="password" id="memberPassword" th:field="*{memberPassword}" required>
        </div>
        <div class="form-group">
          <label for="memberPasswordConfirm">パスワード（確認）</label>
          <input type="password" id="memberPasswordConfirm" th:field="*{memberPasswordConfirm}" required>
        </div>
        <div class="form-group">
          <label for="memberName">氏名</label>
          <input type="text" id="memberName" th:field="*{memberName}" required>
        </div>
        <div class="form-group">
          <label for="memberKana">氏名（カナ）</label>
          <input type="text" id="memberKana" th:field="*{memberKana}" required>
        </div>
        <div class="form-group">
          <label for="memberBirthday">生年月日</label>
          <input type="date" id="memberBirthday" th:field="*{memberBirthday}" required>
        </div>
        <div class="form-group">
          <label for="memberPost">郵便番号（ハイフンなし7桁）</label>
          <input type="text" id="memberPost" th:field="*{memberPost}" maxlength="7" required>
        </div>
        <div class="form-group">
          <label for="memberAddress">住所</label>
          <input type="text" id="memberAddress" th:field="*{memberAddress}" required>
        </div>
        <div class="form-group">
          <label for="memberPhone">電話番号（ハイフンなし）</label>
          <input type="text" id="memberPhone" th:field="*{memberPhone}" maxlength="11" required>
        </div>
        <div class="form-group">
          <label>支払方法</label>
          <label><input type="radio" th:field="*{memberPayment}" value="1">クレジットカード</label>
          <label><input type="radio" th:field="*{memberPayment}" value="9">現金</label>
        </div>

        <button type="submit" class="btn btn--primary btn--block">登録する</button>
      </form>

      <div style="margin-top:1rem; text-align:center;">
        <a th:href="@{/login}">ログイン画面に戻る</a>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; 2022 KEN Furniture Factory</p>
  </footer>

</body>
</html>
