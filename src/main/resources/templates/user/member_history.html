<!DOCTYPE html>

  Copyright 2022 株式会社BREXA Technology
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>購入履歴 | KEN Interior Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/user.css}">
</head>
<body>

  <header class="site-header">
    <a th:href="@{/top}" class="logo">KEN Interior Shop</a>
    <nav>
      <a th:href="@{/member/mypage}">マイページ</a>
      <a th:href="@{/cart}">カート</a>
      <form th:action="@{/logout}" method="post" style="display:inline;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="btn--link">ログアウト</button>
      </form>
    </nav>
  </header>

  <main class="main-content">
    <div class="page-header">
      <h1>購入履歴</h1>
      <a th:href="@{/member/mypage}" class="btn btn--secondary">マイページに戻る</a>
    </div>

    <div th:if="${#lists.isEmpty(historyList)}">
      <p>購入履歴がありません。</p>
    </div>

    <div class="table-wrapper" th:unless="${#lists.isEmpty(historyList)}">
      <table>
        <thead>
          <tr>
            <th>購入ID</th>
            <th>購入日</th>
            <th>合計金額</th>
            <th>状態</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="history : ${historyList}">
            <td th:text="${history.purchaseId}"></td>
            <td th:text="${history.purchaseDay}"></td>
            <td th:text="${#numbers.formatInteger(history.totalAmount, 1, 'COMMA') + '円'}"></td>
            <td th:text="${history.cancelFlag == '0' ? '購入済' : 'キャンセル'}"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; 2022 KEN Furniture Factory</p>
  </footer>

</body>
</html>
