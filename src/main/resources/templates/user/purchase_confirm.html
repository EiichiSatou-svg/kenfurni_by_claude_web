<!DOCTYPE html>
<!--
  購入確認画面
  Copyright 2022 株式会社BREXA Technology
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>購入確認 | KEN Interior Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/user.css}">
</head>
<body>

  <header class="site-header">
    <a th:href="@{/top}" class="logo">KEN Interior Shop</a>
    <nav>
      <a th:href="@{/member/mypage}">マイページ</a>
      <a th:href="@{/cart}">カート</a>
      <form th:action="@{/logout}" method="post" style="display:inline;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="btn--link">ログアウト</button>
      </form>
    </nav>
  </header>

  <main class="main-content">
    <h1>購入確認</h1>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>商品名</th>
            <th>単価</th>
            <th>数量</th>
            <th>小計</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="item : ${cartItems}">
            <td th:text="${item.productName}"></td>
            <td th:text="${#numbers.formatInteger(item.productPrice, 1, 'COMMA') + '円'}"></td>
            <td th:text="${item.quantity}"></td>
            <td th:text="${#numbers.formatInteger(item.subtotal, 1, 'COMMA') + '円'}"></td>
          </tr>
        </tbody>
      </table>
    </div>

    <div style="margin-top:1.5rem; text-align:right;">
      <p style="font-size:1.2rem; font-weight:700; margin-bottom:1rem;"
         th:text="'合計：' + ${#numbers.formatInteger(totalAmount, 1, 'COMMA')} + '円'"></p>
      <a th:href="@{/cart}" class="btn btn--secondary" style="margin-right:0.5rem;">カートに戻る</a>
      <form th:action="@{/purchase/complete}" method="post" style="display:inline;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="btn btn--primary">注文を確定する</button>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; 2022 KEN Furniture Factory</p>
  </footer>

</body>
</html>
