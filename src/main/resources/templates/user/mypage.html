<!DOCTYPE html>
<!--
  会員情報確認画面
  Copyright 2022 株式会社BREXA Technology
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイページ | KEN Interior Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/user.css}">
</head>
<body>

  <header class="site-header">
    <a th:href="@{/top}" class="logo">KEN Interior Shop</a>
    <nav>
      <a th:href="@{/member/mypage}">マイページ</a>
      <a th:href="@{/cart}">カート</a>
      <form th:action="@{/logout}" method="post" style="display:inline;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="btn--link">ログアウト</button>
      </form>
    </nav>
  </header>

  <main class="main-content">
    <div class="page-header">
      <h1>マイページ</h1>
      <div>
        <a th:href="@{/member/mypage/edit}" class="btn btn--primary" style="margin-right:0.5rem;">会員情報を更新する</a>
        <a th:href="@{/member/history}" class="btn btn--secondary">購入履歴を見る</a>
      </div>
    </div>

    <div class="form-card" style="max-width:600px;">
      <table>
        <tr>
          <th>氏名</th>
          <td th:text="${member.memberName}"></td>
        </tr>
        <tr>
          <th>氏名（カナ）</th>
          <td th:text="${member.memberKana}"></td>
        </tr>
        <tr>
          <th>メールアドレス</th>
          <td th:text="${member.memberMail}"></td>
        </tr>
        <tr>
          <th>生年月日</th>
          <td th:text="${member.memberBirthday}"></td>
        </tr>
        <tr>
          <th>郵便番号</th>
          <td th:text="${member.memberPost}"></td>
        </tr>
        <tr>
          <th>住所</th>
          <td th:text="${member.memberAddress}"></td>
        </tr>
        <tr>
          <th>電話番号</th>
          <td th:text="${member.memberPhone}"></td>
        </tr>
        <tr>
          <th>支払方法</th>
          <td th:text="${member.memberPayment == '1' ? 'クレジットカード' : '現金'}"></td>
        </tr>
        <tr>
          <th>ポイント</th>
          <td th:text="${member.memberPoint} + 'pt'"></td>
        </tr>
      </table>
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; 2022 KEN Furniture Factory</p>
  </footer>

</body>
</html>
