<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パスワード再発行 | KEN Interior Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

  <header class="site-header">
    <a th:href="@{/top}" class="logo">KEN Interior Shop</a>
  </header>

  <main class="login-main">
    <div class="login-card">
      <h1 class="login-title">パスワード再発行</h1>

      <div th:if="${errorMessage}" class="msg msg--error" th:text="${errorMessage}"></div>

      <form th:action="@{/member/password-reset}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="form-group">
          <label for="memberMail">メールアドレス</label>
          <input type="email" id="memberMail" name="memberMail"
                 th:value="${memberMail}" required>
        </div>
        <div class="form-group">
          <label for="newPassword">新しいパスワード（10文字以上）</label>
          <input type="password" id="newPassword" name="newPassword" required>
        </div>
        <div class="form-group">
          <label for="newPasswordConfirm">新しいパスワード（確認）</label>
          <input type="password" id="newPasswordConfirm" name="newPasswordConfirm" required>
        </div>

        <button type="submit" class="btn btn--primary btn--block">パスワードを変更する</button>
      </form>

      <div style="margin-top:1rem; text-align:center;">
        <a th:href="@{/login}">ログイン画面に戻る</a>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; 2022 KEN Furniture Factory</p>
  </footer>

</body>
</html>
