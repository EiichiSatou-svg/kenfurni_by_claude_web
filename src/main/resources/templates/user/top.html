<!DOCTYPE html>
<!--
  トップ画面（商品一覧）
  Copyright 2022 株式会社BREXA Technology
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品一覧 | KEN Interior Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/user.css}">
</head>
<body>

  <header class="site-header">
    <a th:href="@{/top}" class="logo">KEN Interior Shop</a>
    <nav>
      <a th:href="@{/member/mypage}">マイページ</a>
      <a th:href="@{/cart}">カート</a>
      <form th:action="@{/logout}" method="post" style="display:inline;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="btn--link">ログアウト</button>
      </form>
    </nav>
  </header>

  <main class="main-content">
    <h1>商品一覧</h1>

    <div class="search-bar">
      <form th:action="@{/top}" method="get" style="display:flex; gap:0.5rem; width:100%;">
        <input type="text" name="keyword" placeholder="商品名で検索"
               th:value="${keyword}">
        <button type="submit" class="btn btn--primary">検索</button>
      </form>
    </div>

    <div class="category-tabs">
      <a th:href="@{/top}" class="category-tab"
         th:classappend="${categoryId == null and keyword == null ? 'active' : ''}">すべて</a>
      <a th:href="@{/top(categoryId=1)}" class="category-tab"
         th:classappend="${categoryId == 1 ? 'active' : ''}">ベッド</a>
      <a th:href="@{/top(categoryId=2)}" class="category-tab"
         th:classappend="${categoryId == 2 ? 'active' : ''}">テーブル・机</a>
      <a th:href="@{/top(categoryId=3)}" class="category-tab"
         th:classappend="${categoryId == 3 ? 'active' : ''}">本棚・ラック・シェルフ</a>
      <a th:href="@{/top(categoryId=4)}" class="category-tab"
         th:classappend="${categoryId == 4 ? 'active' : ''}">椅子・チェア</a>
    </div>

    <div class="product-grid">
      <a th:each="product : ${products}"
         th:href="@{/products/{id}(id=${product.productId})}"
         class="product-card">
        <img th:if="${product.productImage != null}"
             th:src="@{'/images/' + ${product.productImage}}"
             th:alt="${product.productName}">
        <div th:unless="${product.productImage != null}"
             style="width:100%; height:180px; background:var(--color-gray-light); display:flex; align-items:center; justify-content:center; color:var(--color-gray);">
          画像なし
        </div>
        <div class="product-card-body">
          <p class="product-card-name" th:text="${product.productName}"></p>
          <p class="product-card-price"
             th:text="${#numbers.formatInteger(product.productDiscountPrice != null ? product.productDiscountPrice : product.productPrice, 1, 'COMMA') + '円'}"></p>
        </div>
      </a>
    </div>

    <p th:if="${#lists.isEmpty(products)}" style="margin-top:2rem; color:var(--color-gray);">
      商品が見つかりませんでした。
    </p>
  </main>

  <footer class="site-footer">
    <p>&copy; 2022 KEN Furniture Factory</p>
  </footer>

</body>
</html>
